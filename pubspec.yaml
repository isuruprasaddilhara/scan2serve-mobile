name: scan2serve
description: Scan2Serve Flutter UI prototype
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.6.0
  http: ^1.2.2
  app_links: ^6.4.1
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/scan2serve_logo.png
    - assets/images/chatbot_avatar.png
    - assets/sounds/notify.mp3